name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Configure
      run: cmake -B build -S . -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

    - name: Build
      run: cmake --build build --config ${{ env.BUILD_TYPE }}

    - name: Hash
      run: |
        $hash = (Get-FileHash build/Release/Hyperion.exe -Algorithm SHA256).Hash
        echo "SHA256: $hash" | Tee-Object -FilePath build/Release/SHA256.txt
      shell: pwsh

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Hyperion-x64
        path: |
          build/Release/Hyperion.exe
          build/Release/SHA256.txt
